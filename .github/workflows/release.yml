name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: cp -r apps/web/out apps/desktop/web-out
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-src
          path: apps/desktop
          retention-days: 1

  build-mac:
    needs: build-web
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: desktop-src
          path: apps/desktop
      - run: pnpm run build:desktop:mac
      - uses: actions/upload-artifact@v4
        with:
          name: release-mac
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
          retention-days: 1

  build-win:
    needs: build-web
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: desktop-src
          path: apps/desktop
      - run: pnpm run build:desktop:win
      - uses: actions/upload-artifact@v4
        with:
          name: release-win
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.zip
          retention-days: 1

  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-mac
          path: release
      - uses: actions/download-artifact@v4
        with:
          name: release-win
          path: release
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
